<button class="past-purchase" type="button" data-product='{{product}}' aria-label="Remover {{name}} do histórico">
    <span class="purchase-icon"><i class="bi bi-bag-check"></i></span>
    <span class="purchase-info"><strong>{{name}}</strong><small>{{category}} · R$ {{price}}</small></span>
    <i class="bi bi-x-lg remove-icon" aria-hidden="true"></i>
</button>
